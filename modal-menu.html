<button class="open-button" id="openModal">Open Menu</button>

<script>
  // Basic JavaScript to handle modal opening and closing
  document.getElementById('openModal').addEventListener('click', () => document.getElementById('modalMenu').classList.add('active'));
  document.getElementById('closeModal').addEventListener('click', () => document.getElementById('modalMenu').classList.remove('active'));
  document.querySelector('.modal-overlay').addEventListener('click', () => document.getElementById('modalMenu').classList.remove('active'));
</script>
